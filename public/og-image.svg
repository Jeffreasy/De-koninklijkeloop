<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#162033"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9328"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative elements -->
  <circle cx="1050" cy="100" r="250" fill="#ff9328" opacity="0.03"/>
  <circle cx="150" cy="530" r="200" fill="#ff9328" opacity="0.025"/>
  <circle cx="600" cy="315" r="350" fill="#1e293b" opacity="0.3"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo from ImageKit -->
  <image x="440" y="60" width="320" height="200"
         href="https://ik.imagekit.io/a0oim4e3e/tr:w-400,f-auto,q-90/De%20Koninklijkeloop/webassets/DKLLogoV1_kx60i9.webp"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- Year badge -->
  <text x="600" y="320" text-anchor="middle" fill="#ff9328" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="4" opacity="0.95">
    2026
  </text>

  <!-- Separator -->
  <rect x="480" y="345" width="240" height="2" fill="#ff9328" opacity="0.5" rx="1"/>

  <!-- Date & Location -->
  <text x="600" y="400" text-anchor="middle" fill="#e2e8f0" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="26" font-weight="500" letter-spacing="1">
    16 Mei 2026  ·  Kootwijk – Apeldoorn
  </text>

  <!-- Tagline -->
  <text x="600" y="460" text-anchor="middle" fill="#94a3b8" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="22" font-weight="400">
    Inclusief wandelevenement  ·  Goede doel: Only Friends
  </text>

  <!-- Route badges -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="600" text-anchor="middle">
    <rect x="435" y="490" width="80" height="30" rx="15" fill="#ff9328" opacity="0.15"/>
    <text x="475" y="510" fill="#ff9328">2,5 km</text>
    <rect x="525" y="490" width="70" height="30" rx="15" fill="#ff9328" opacity="0.15"/>
    <text x="560" y="510" fill="#ff9328">6 km</text>
    <rect x="605" y="490" width="75" height="30" rx="15" fill="#ff9328" opacity="0.15"/>
    <text x="642" y="510" fill="#ff9328">10 km</text>
    <rect x="690" y="490" width="75" height="30" rx="15" fill="#ff9328" opacity="0.15"/>
    <text x="727" y="510" fill="#ff9328">15 km</text>
  </g>

  <!-- Website URL -->
  <text x="600" y="575" text-anchor="middle" fill="#475569" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="17" font-weight="400" letter-spacing="2">
    dekoninklijkeloop.nl
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
